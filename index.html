<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FBF8F3" />
    <title>Lutris.ai</title>
    <meta name="description" content="AI-native design tool — from PRD to design to code" />
    <meta property="og:title" content="Lutris.ai — AI-Native Design Tool" />
    <meta property="og:description" content="From product requirements to pixel-perfect designs to production code. All in one tool." />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lutris.ai — AI-Native Design Tool" />
    <meta name="twitter:description" content="From PRD to design to code. AI-powered. Open source." />
    <meta name="twitter:image" content="/pwa-512x512.png" />
    <style>
      body { margin: 0; background: #FBF8F3; }
      #loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: #FBF8F3;
        transition: opacity 0.3s;
        gap: 16px;
      }
      #loader.fade-out { opacity: 0; pointer-events: none; }
      #loader img {
        width: 64px;
        height: 64px;
        animation: bounce 2s ease-in-out infinite;
        filter: drop-shadow(0 4px 12px rgba(59, 122, 107, 0.15));
      }
      #loader .text {
        font-family: Georgia, serif;
        font-size: 14px;
        color: #8B7E6A;
        letter-spacing: 0.5px;
      }
      #loader .bar {
        width: 120px;
        height: 3px;
        background: #E8E0D4;
        border-radius: 2px;
        overflow: hidden;
      }
      #loader .bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 40%;
        background: #3B7A6B;
        border-radius: 2px;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
    </style>
  </head>

  <body>
    <div id="loader">
      <img src="/lutris-otter.png" alt="Loading..." />
      <div class="text">Loading Lutris.ai...</div>
      <div class="bar"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
